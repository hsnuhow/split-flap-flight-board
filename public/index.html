<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAL Flight Information Board</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        @font-face {
            font-family: 'NotoSansTC';
            src: url('fonts/NotoSansTC-VariableFont_wght.ttf') format('truetype');
            font-weight: 100 900;
            font-display: block;
        }

        body {
            background-color: #003087;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #board-container {
            width: 90vw;
            height: 86vh;
            background-color: #1a1a1a;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0.8vw;
            gap: 0.4vh;
        }

        /* ── Logo Bar ─────────────────────────────── */
        #logo-bar {
            flex: 0 0 auto;
            height: 12vh;
            display: flex;
            align-items: center;
            gap: 1.2vw;
            padding: 0 0.4vw 0.5vh;
            border-bottom: 1px solid #2e2e2e;
        }

        #cal-logo {
            height: 10vh;
            object-fit: contain;
        }

        #board-title-block {
            display: flex;
            flex-direction: column;
            gap: 3px;
            line-height: 1;
        }

        #board-title-zh {
            color: #ffcc00;
            font-size: 1.1vw;
            font-weight: bold;
            letter-spacing: 0.25em;
        }

        #board-title-en {
            color: #666;
            font-size: 0.65vw;
            letter-spacing: 0.18em;
        }

        /* Section indicator – top-right of logo bar */
        #section-indicator {
            margin-left: auto;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        #datetime-display {
            color: #ffcc00;
            font-size: 1.05vw;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.08em;
            font-weight: bold;
        }

        #section-label {
            color: #ffcc00;
            font-size: 1.0vw;
            font-weight: bold;
            letter-spacing: 0.15em;
            transition: opacity 0.25s;
        }

        #update-label {
            color: #444;
            font-size: 0.6vw;
            letter-spacing: 0.05em;
        }

        /* ── Flight Board ─────────────────────────── */
        #flight-board {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-height: 0;
        }

        .row {
            flex: 1;
            display: flex;
            gap: 0.8vw;
            min-height: 0;
        }

        /* Header row: single solid block per column, no flap cells */
        .header-cell {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffcc00;
            font-size: 1.2vw;
            font-weight: bold;
            background-color: #252525;
            border: 1px solid #333;
            border-radius: 2px;
            letter-spacing: 0.15em;
            white-space: nowrap;
            overflow: hidden;
        }

        .column {
            display: flex;
            gap: 1.5px;
            min-width: 0;
        }

        .flap {
            flex: 1;
            position: relative;
            background-color: #000;
            border-radius: 2px;
            min-width: 0;
        }

        .flap .top,
        .flap .bottom,
        .flap .flipper {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e8e8e8;
            font-size: 1.5vw;
            font-weight: bold;
            background-color: #111;
            border: 1px solid #252525;
            box-sizing: border-box;
            overflow: hidden;
            white-space: nowrap;
            transform: scaleX(0.9);
            transform-origin: center center;
        }

        .flap .top    { clip-path: inset(0 0 50% 0); }
        .flap .bottom { clip-path: inset(50% 0 0 0); }

        .flap .flipper {
            clip-path: inset(0 0 50% 0);
            transform-origin: center bottom;
            z-index: 5;
        }

        /* centre divider line */
        .flap::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background-color: #000;
            z-index: 10;
            pointer-events: none;
        }

        /* 英文翻牌動畫（保持 scaleX 0.9） */
        .flap.flipping .flipper {
            animation: flip-down 0.13s cubic-bezier(0.4, 0.0, 1, 1) forwards;
        }

        @keyframes flip-down {
            0%   { transform: perspective(500px) scaleX(0.9) rotateX(0deg); }
            100% { transform: perspective(500px) scaleX(0.9) rotateX(-90deg); }
        }

        /* 中文翻牌：思源黑體，中文為寬度基準（scaleX 1.0，不壓縮） */
        .flap.cjk .top,
        .flap.cjk .bottom,
        .flap.cjk .flipper {
            font-family: 'NotoSansTC', sans-serif;
            transform: scaleX(1.0);
        }

        .flap.cjk.flipping .flipper {
            animation: flip-down-cjk 0.13s cubic-bezier(0.4, 0.0, 1, 1) forwards;
        }

        @keyframes flip-down-cjk {
            0%   { transform: perspective(500px) scaleX(1.0) rotateX(0deg); }
            100% { transform: perspective(500px) scaleX(1.0) rotateX(-90deg); }
        }

        /* ── Status Bar ───────────────────────────── */
        #status-bar {
            flex: 0 0 auto;
            height: 2.4vh;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 0.4vw;
            gap: 0.8vw;
            border-top: 1px solid #222;
        }

        #no-data-msg {
            margin-right: auto;
            color: #444;
            font-size: 0.65vw;
            letter-spacing: 0.05em;
            display: none;
        }

        #page-indicator {
            color: #555;
            font-size: 0.65vw;
            font-family: 'Courier New', monospace;
            min-width: 4em;
            text-align: right;
        }

        #countdown-bar {
            width: 60px;
            height: 2px;
            background: #222;
            border-radius: 1px;
            overflow: hidden;
        }

        #countdown-fill {
            height: 100%;
            background: #ffcc00;
            width: 100%;
        }

        /* ── Overlay (for ?refresh info) ─────────── */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        #overlay.show { display: flex; }
        #overlay-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 2em 2.5em;
            max-width: 40vw;
            color: #ccc;
            font-size: 0.85vw;
            line-height: 1.8;
        }
        #overlay-box h2 { color: #ffcc00; margin-bottom: 0.8em; font-size: 1vw; }
        #overlay-box code { background: #111; padding: 0.1em 0.4em; border-radius: 3px; color: #7cf; }
        #overlay-close {
            margin-top: 1.2em;
            display: inline-block;
            padding: 0.4em 1.2em;
            background: #333;
            color: #ffcc00;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8vw;
        }
        #overlay-close:hover { background: #444; }
    </style>
</head>
<body>

<div id="board-container">

    <div id="logo-bar">
        <img src="CAL_logo.png" id="cal-logo" alt="China Airlines Logo">
        <div id="board-title-block">
            <div id="board-title-zh">中華航空　航班資訊看板</div>
            <div id="board-title-en">CHINA AIRLINES  FLIGHT INFORMATION DISPLAY</div>
        </div>
        <div id="section-indicator">
            <div id="datetime-display">—</div>
            <div id="section-label">—</div>
            <div id="update-label">載入中…</div>
        </div>
    </div>

    <div id="flight-board"></div>

    <div id="status-bar">
        <div id="no-data-msg">尚無資料，請執行 npm run fetch 後部署</div>
        <div id="page-indicator">— / —</div>
        <div id="countdown-bar"><div id="countdown-fill"></div></div>
    </div>

</div>

<!-- Refresh info overlay -->
<div id="overlay">
    <div id="overlay-box">
        <h2>資料更新說明</h2>
        <p>本看板每 30 分鐘自動從 API 取得最新航班資料。</p>
        <br>
        <p><strong>手動立即更新：</strong>在網址列加上 <code>?refresh</code></p>
        <p>例如：<code>https://your-domain.web.app/?refresh</code></p>
        <br>
        <p><strong>部署靜態資料：</strong></p>
        <p><code>npm run fetch</code> &nbsp;→&nbsp; <code>firebase deploy</code></p>
        <br>
        <p style="color:#555;font-size:0.75vw;">資料來源：交通部 TDX 平台 &nbsp;|&nbsp; 機場：TPE 桃園</p>
        <button id="overlay-close" onclick="document.getElementById('overlay').classList.remove('show')">關閉</button>
    </div>
</div>

<script>
// ================================================================
// ██████╗  ██████╗ ███╗   ██╗███████╗██╗ ██████╗
// ██╔════╝██╔═══██╗████╗  ██║██╔════╝██║██╔════╝
// ██║     ██║   ██║██╔██╗ ██║█████╗  ██║██║  ███╗
// ██║     ██║   ██║██║╚██╗██║██╔══╝  ██║██║   ██║
// ╚██████╗╚██████╔╝██║ ╚████║██║     ██║╚██████╔╝
//  ╚═════╝ ╚═════╝ ╚═╝  ╚═══╝╚═╝     ╚═╝ ╚═════╝
// ================================================================
// 設定（TDX 憑證已移至 Firebase Cloud Function，前端不再存放）
// ================================================================
const CONFIG = {
    airport:       'TPE',
    airline:       'CI',
    intervalMs:    10000,   // 每頁顯示秒數（毫秒）
    pageSize:      10,      // 每頁顯示航班數
    refreshMs:     30 * 60 * 1000,  // 資料自動更新間隔（30 分鐘）
};

// ================================================================
// 機場代碼 → 顯示名稱（從 data/airports.json 載入）
// ================================================================
let AIRPORT_NAMES = {};

async function loadAirports() {
    try {
        const res = await fetch('data/airports.json');
        if (res.ok) AIRPORT_NAMES = await res.json();
    } catch(e) {
        console.warn('Failed to load airports.json:', e);
    }
}

function airportName(code, lang) {
    if (!code) return '---';
    const entry = AIRPORT_NAMES[code];
    if (!entry) return code;
    return lang === 'zh' ? entry.zh : entry.en;
}

// ================================================================
// 版面配置
// COL_LENGTHS: 每欄「字元數」，同時也是 flex 比例
//   航廈 | 航班     | 目的地/來源地     | 時間   | 狀態
// ================================================================
const COL_LENGTHS = [7, 18, 8, 4, 4, 10]; // 時間7、目的地18、航班8、航廈4、登機門4、狀態10

const PHASES = [
    { type:'arrival',   lang:'zh', label:'入境　中文' },
    { type:'arrival',   lang:'en', label:'ARRIVALS  ENG' },
    { type:'departure', lang:'zh', label:'出境　中文' },
    { type:'departure', lang:'en', label:'DEPARTURES  ENG' },
];

const HEADERS = {
    'arrival-zh':   ['時間','來源地','航班','航廈','登機門','狀態'],
    'arrival-en':   ['TIME','FROM','FLIGHT','TERM','GATE','STATUS'],
    'departure-zh': ['時間','目的地','航班','航廈','登機門','狀態'],
    'departure-en': ['TIME','DEST','FLIGHT','TERM','GATE','STATUS'],
};

const RANDOM_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 ';

// 判斷是否為中文字元
function isCJK(ch) {
    return /[\u4e00-\u9fff\u3000-\u303f]/.test(ch);
}


// ================================================================
// 資料過濾（出境：航班白名單；入境：目的地機場白名單）
// ================================================================
const ALLOWED_DEPARTURE_FLIGHTS = new Set([
    'CI81','CI36','CI12','CI24','CI73','CI61','CI63','CI75',
    'CI22','CI4','CI67','CI57','CI8','CI51','CI32','CI53'
]);
const TARGET_AIRPORTS = new Set([
    'LHR','PHX','JFK','ONT','AMS','FRA','VIE','FCO',
    'SEA','SFO','PRG','MEL','LAX','SYD','YVR','BNE','AKL'
]);

function filterFlights(flights, type) {
    if (type === 'departure') {
        return flights.filter(f => ALLOWED_DEPARTURE_FLIGHTS.has(f.flightNumber));
    }
    return flights.filter(f => TARGET_AIRPORTS.has(f.airportCode));
}

function mergeCi53(flights) {
    const ci53 = flights.filter(f => f.flightNumber === 'CI53');
    if (ci53.length <= 1) return flights;
    const merged = {
        ...ci53[0],
        airportCode:   'BNE/AKL',
        airportNameZh: '布里斯本/奧克蘭',
        airportNameEn: 'Brisbane/Auckland',
    };
    return [...flights.filter(f => f.flightNumber !== 'CI53'), merged]
        .sort((a, b) => a.scheduledTime.localeCompare(b.scheduledTime));
}

// ================================================================
// 狀態
// ================================================================
let flightData  = { arrival: [], departure: [] };
let flapElements = [];   // [rowIdx][colIdx][charIdx] = {container, top, bottom, flipper, current}
let headerCells  = [];   // [colIdx] = header cell DOM element
let phaseIdx    = 0;
let pageIdx     = 0;
let rotationTimer   = null;
let countdownTimer  = null;
let updatedAt   = null;

// ================================================================
// 資料載入
// ================================================================
// getTDXToken 已移除；憑證改存於 Firebase Cloud Function（/api/flights）

function formatTime(iso) {
    if (!iso) return '--:--';
    // "2024-01-01T23:55:00+08:00" → "23:55"
    const m = iso.match(/T(\d{2}:\d{2})/);
    return m ? m[1] : '--:--';
}

// TDX 狀態欄位有時將中英文合併（如「已到ARRIVED」「準時ON TIME」），拆開處理
function parseStatus(raw, rawEn) {
    const str = raw || '';
    const strEn = rawEn || '';
    if (strEn) return { zh: str, en: strEn };
    const zh = (str.match(/[\u4e00-\u9fff]+/g) || []).join('');
    const en = (str.match(/[A-Z][A-Z ]+/g) || []).map(s => s.trim()).join(' ');
    return { zh: zh || str, en: en || str };
}

function normalizeFlight(raw, type) {
    const isArr = (type === 'arrival');
    const airportCode = isArr ? raw.DepartureAirportID : raw.ArrivalAirportID;
    const time = isArr ? formatTime(raw.ScheduleArrivalTime) : formatTime(raw.ScheduleDepartureTime);

    return {
        terminal:      raw.Terminal || '--',
        flightNumber:  `${raw.AirlineID}${raw.FlightNumber}`,
        airportCode:   airportCode,
        airportNameZh: airportName(airportCode, 'zh'),
        airportNameEn: airportName(airportCode, 'en'),
        scheduledTime: time,
        ...(() => {
            const s = parseStatus(
                raw.ArrivalRemark   || raw.DepartureRemark   || '',
                raw.ArrivalRemarkEn || raw.DepartureRemarkEn || ''
            );
            return { statusZh: s.zh, statusEn: s.en };
        })(),
    };
}

// ================================================================
// 去重：同航班號 + 時刻 + 機場代碼 視為同一筆
// 若狀態不同，保留「非空白且非準時/ON TIME」的那筆（較新狀態）
// ================================================================
function deduplicateFlights(flights) {
    const seen = new Map();
    for (const f of flights) {
        const key = `${f.flightNumber}|${f.scheduledTime}|${f.airportCode}`;
        if (!seen.has(key)) {
            seen.set(key, f);
        } else {
            // 若現有的是「準時/ON TIME/空白」，新的有更具體狀態則替換
            const existing = seen.get(key);
            const bland = /^(準時|ON TIME|)$/i;
            if (bland.test(existing.statusZh) && !bland.test(f.statusZh)) {
                seen.set(key, f);
            }
        }
    }
    return Array.from(seen.values());
}

// 呼叫 Firebase Cloud Function（憑證安全存於後端）
async function fetchFromAPI() {
    const [arrRes, depRes] = await Promise.all([
        fetch('/api/flights?type=arrival'),
        fetch('/api/flights?type=departure'),
    ]);

    if (!arrRes.ok) throw new Error(`API arrival ${arrRes.status}`);
    if (!depRes.ok) throw new Error(`API departure ${depRes.status}`);

    const arrData = await arrRes.json();
    const depData = await depRes.json();

    flightData.arrival   = mergeCi53(filterFlights(deduplicateFlights(arrData.flights || []), 'arrival'));
    flightData.departure = mergeCi53(filterFlights(deduplicateFlights(depData.flights || []), 'departure'));
    updatedAt = arrData.updatedAt || new Date().toISOString();

    // 更新 localStorage cache
    localStorage.setItem('cal_board_cache', JSON.stringify({
        updatedAt,
        arrival:   flightData.arrival,
        departure: flightData.departure,
    }));
}

async function loadFromStaticFiles() {
    const [arrRes, depRes] = await Promise.all([
        fetch('data/arrival.json'),
        fetch('data/departure.json'),
    ]);

    if (arrRes.ok) {
        const d = await arrRes.json();
        flightData.arrival = mergeCi53(filterFlights(deduplicateFlights(d.flights || []), 'arrival'));
        updatedAt = d.updatedAt || updatedAt;
    }
    if (depRes.ok) {
        const d = await depRes.json();
        flightData.departure = mergeCi53(filterFlights(deduplicateFlights(d.flights || []), 'departure'));
        if (!updatedAt) updatedAt = d.updatedAt;
    }
}

function loadFromLocalStorage() {
    try {
        const raw = localStorage.getItem('cal_board_cache');
        if (!raw) return false;
        const cache = JSON.parse(raw);
        if (!cache.updatedAt) return false;
        const age = Date.now() - new Date(cache.updatedAt).getTime();
        if (age > 24 * 60 * 60 * 1000) return false; // expired after 24h
        flightData.arrival   = mergeCi53(filterFlights(cache.arrival   || [], 'arrival'));
        flightData.departure = mergeCi53(filterFlights(cache.departure || [], 'departure'));
        updatedAt = cache.updatedAt;
        return true;
    } catch { return false; }
}

async function loadData() {
    const params = new URLSearchParams(window.location.search);

    if (params.has('forcereflash')) {
        // 強制重新呼叫 TDX API，繞過所有快取，靜默無 overlay
        const label = document.getElementById('update-label');
        label.textContent = '強制更新中…';
        try {
            await fetchFromAPI();
            label.textContent = '✓ 已強制更新';
            setTimeout(() => updateTimeLabel(), 3000);
        } catch (e) {
            console.warn('Force refresh failed:', e.message);
            label.textContent = '強制更新失敗';
        }
        // 移除網址參數，避免重整時重複觸發
        history.replaceState(null, '', window.location.pathname);
        return;
    }

    if (params.has('refresh')) {
        // Show info overlay, then try live API
        document.getElementById('overlay').classList.add('show');
        try {
            await fetchFromAPI();
            document.getElementById('update-label').textContent = '已即時更新';
        } catch (e) {
            console.warn('Live API fetch failed:', e.message);
        }
        return;
    }

    // 1. Try localStorage cache (< 24h)
    if (loadFromLocalStorage()) return;

    // 2. Fall back to static pre-fetched files
    await loadFromStaticFiles();
}

// ================================================================
// 即時時鐘
// ================================================================
function updateClock() {
    const now  = new Date();
    const DAYS = ['日','一','二','三','四','五','六'];
    const pad  = n => String(n).padStart(2, '0');
    const str  = `${now.getFullYear()} · ${pad(now.getMonth()+1)} · ${pad(now.getDate())}  星期${DAYS[now.getDay()]}  ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    document.getElementById('datetime-display').textContent = str;
}

function updateTimeLabel() {
    const el = document.getElementById('update-label');
    if (!updatedAt) { el.textContent = '無資料'; return; }
    const d = new Date(updatedAt);
    const str = d.toLocaleString('zh-TW', {
        month: 'numeric', day: 'numeric',
        hour: '2-digit', minute: '2-digit', hour12: false,
    });
    el.textContent = `更新：${str}`;
}

// ================================================================
// 看板初始化
// ================================================================
function initBoard() {
    const board = document.getElementById('flight-board');
    board.innerHTML = '';
    flapElements = [];

    const totalRows = CONFIG.pageSize + 1; // 1 header + pageSize data rows

    for (let rowIdx = 0; rowIdx < totalRows; rowIdx++) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'row' + (rowIdx === 0 ? ' header-row' : '');

        if (rowIdx === 0) {
            // 標題列：每欄一個整塊 header-cell，不使用翻牌格
            headerCells = [];
            COL_LENGTHS.forEach(colLen => {
                const colDiv = document.createElement('div');
                colDiv.className = 'column';
                colDiv.style.flex = colLen;
                const cell = document.createElement('div');
                cell.className = 'header-cell';
                colDiv.appendChild(cell);
                rowDiv.appendChild(colDiv);
                headerCells.push(cell);
            });
            board.appendChild(rowDiv);
            flapElements.push([]); // 佔位，保持 rowIdx 對齊
            continue;
        }

        const flapRow = [];

        COL_LENGTHS.forEach(colLen => {
            const colDiv = document.createElement('div');
            colDiv.className = 'column';
            colDiv.style.flex = colLen;

            const flapsInCol = [];
            for (let i = 0; i < colLen; i++) {
                const flap    = document.createElement('div'); flap.className = 'flap';
                const top     = document.createElement('div'); top.className = 'top';     top.textContent = ' ';
                const bottom  = document.createElement('div'); bottom.className = 'bottom'; bottom.textContent = ' ';
                const flipper = document.createElement('div'); flipper.className = 'flipper'; flipper.textContent = ' ';
                flap.append(top, bottom, flipper);
                colDiv.appendChild(flap);
                flapsInCol.push({ container: flap, top, bottom, flipper, current: ' ' });
            }

            rowDiv.appendChild(colDiv);
            flapRow.push(flapsInCol);
        });

        board.appendChild(rowDiv);
        flapElements.push(flapRow);
    }
}

// ================================================================
// 顯示邏輯
// ================================================================
function getRowData(flight, type, lang) {
    // 目的地：若靜態資料未解析（存了原始代號），即時 fallback 查 AIRPORT_NAMES
    const code = flight.airportCode || '';
    const destZh = (flight.airportNameZh && flight.airportNameZh !== code)
        ? flight.airportNameZh : airportName(code, 'zh');
    const destEn = (flight.airportNameEn && flight.airportNameEn !== code)
        ? flight.airportNameEn : airportName(code, 'en');

    // 航班：首尾留空 → " CI81   "（8 bits）
    const fnDisplay = (' ' + flight.flightNumber).padEnd(7, ' ') + ' ';

    // 航廈：首尾留空 → " T1 "（4 bits）
    const term = (flight.terminal || '-').toString().trim();
    const termDisplay = ' T' + term.slice(0, 1) + ' ';

    // 登機門：首尾留空 → " A7 "（4 bits）
    const rawGate = (flight.gate || '--').trim();
    const gateDisplay = ' ' + rawGate.slice(0, 2) + ' ';

    // 時間：首尾留空 → " 23:55 "（7 bits）
    const timeDisplay = ' ' + flight.scheduledTime + ' ';

    return [
        timeDisplay,
        lang === 'zh' ? destZh : destEn,
        fnDisplay,
        termDisplay,
        gateDisplay,
        lang === 'zh' ? (flight.statusZh || '') : (flight.statusEn || ''),
    ];
}

function updateRow(rowIdx, colData) {
    COL_LENGTHS.forEach((colLen, colIdx) => {
        const str   = String(colData[colIdx] ?? '').padEnd(colLen, ' ').slice(0, colLen);
        const flaps = flapElements[rowIdx][colIdx];

        for (let i = 0; i < flaps.length; i++) {
            const targetChar = str[i] ?? ' ';
            const flapObj    = flaps[i];
            if (flapObj.current === targetChar) continue;

            if (rowIdx === 0) {
                // 標題列直接寫死，不翻牌
                flapObj.top.textContent     = targetChar;
                flapObj.bottom.textContent  = targetChar;
                flapObj.flipper.textContent = targetChar;
                flapObj.current             = targetChar;
                flapObj.container.classList.toggle('cjk', isCJK(targetChar));
            } else {
                const delay = Math.random() * 760;
                setTimeout(() => triggerFlip(flapObj, targetChar), delay);
            }
        }
    });
}

function triggerFlip(flapObj, targetChar) {
    let flipCount  = 0;
    const maxFlips = Math.floor(Math.random() * 5) + 3;

    const tick = setInterval(() => {
        flipCount++;
        const nextChar = flipCount >= maxFlips
            ? targetChar
            : RANDOM_CHARS[Math.floor(Math.random() * RANDOM_CHARS.length)];

        if (flipCount >= maxFlips) {
            clearInterval(tick);
            flapObj.current = targetChar;
            flapObj.container.classList.toggle('cjk', isCJK(targetChar));
        }

        flapObj.flipper.textContent = flapObj.top.textContent;
        flapObj.top.textContent     = nextChar;
        flapObj.bottom.textContent  = nextChar;

        flapObj.container.classList.remove('flipping');
        void flapObj.container.offsetWidth; // force reflow
        flapObj.container.classList.add('flipping');
    }, 140);
}

function displayCurrentPage() {
    const phase    = PHASES[phaseIdx];
    const flights  = flightData[phase.type];
    const totalPages = Math.max(1, Math.ceil(flights.length / CONFIG.pageSize));
    const phaseKey = `${phase.type}-${phase.lang}`;

    // Section label (fade)
    const labelEl = document.getElementById('section-label');
    labelEl.style.opacity = '0';
    setTimeout(() => { labelEl.textContent = phase.label; labelEl.style.opacity = '1'; }, 200);

    // Page indicator
    document.getElementById('page-indicator').textContent =
        `${pageIdx + 1} / ${totalPages}`;

    // No-data warning
    const noData = flightData.arrival.length === 0 && flightData.departure.length === 0;
    document.getElementById('no-data-msg').style.display = noData ? 'block' : 'none';

    // Header row (row 0)：直接寫入，不翻牌
    HEADERS[phaseKey].forEach((text, i) => { headerCells[i].textContent = text; });

    // Data rows
    const pageFlights = flights.slice(pageIdx * CONFIG.pageSize, (pageIdx + 1) * CONFIG.pageSize);
    for (let i = 0; i < CONFIG.pageSize; i++) {
        if (i < pageFlights.length) {
            updateRow(i + 1, getRowData(pageFlights[i], phase.type, phase.lang));
        } else {
            updateRow(i + 1, ['', '', '', '', '']);
        }
    }
}

// ================================================================
// 輪播控制
// ================================================================
function advance() {
    const phase = PHASES[phaseIdx];
    const totalPages = Math.max(1, Math.ceil(flightData[phase.type].length / CONFIG.pageSize));

    pageIdx++;
    if (pageIdx >= totalPages) {
        pageIdx   = 0;
        phaseIdx  = (phaseIdx + 1) % PHASES.length;
    }

    displayCurrentPage();
    startCountdown();
}

function startCountdown() {
    const fill = document.getElementById('countdown-fill');
    // Reset
    fill.style.transition = 'none';
    fill.style.width      = '100%';
    void fill.offsetWidth;
    // Animate
    fill.style.transition = `width ${CONFIG.intervalMs}ms linear`;
    fill.style.width      = '0%';
}

function startRotation() {
    if (rotationTimer) clearInterval(rotationTimer);
    displayCurrentPage();
    startCountdown();
    rotationTimer = setInterval(advance, CONFIG.intervalMs);
}

// ================================================================
// 啟動
// ================================================================
window.addEventListener('load', async () => {
    await loadAirports();
    initBoard();
    await loadData();
    updateTimeLabel();
    updateClock();
    setInterval(updateClock, 1000);

    // 每 30 分鐘自動從 API 拉取最新航班資料
    setInterval(async () => {
        try {
            await fetchFromAPI();
            updateTimeLabel();
            displayCurrentPage();
        } catch(e) {
            console.warn('Auto-refresh failed:', e.message);
        }
    }, CONFIG.refreshMs);

    startRotation();
});
</script>
