<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAL Flight Information Board</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        @font-face {
            font-family: 'NotoSansTC';
            src: url('fonts/NotoSansTC-VariableFont_wght.ttf') format('truetype');
            font-weight: 100 900;
            font-display: block;
        }

        body {
            background-color: #003087;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #board-container {
            width: 90vw;
            height: 86vh;
            background-color: #1a1a1a;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0.8vw;
            gap: 0.4vh;
        }

        /* ── Logo Bar ─────────────────────────────── */
        #logo-bar {
            flex: 0 0 auto;
            height: 12vh;
            display: flex;
            align-items: center;
            gap: 1.2vw;
            padding: 0 0.4vw 0.5vh;
            border-bottom: 1px solid #2e2e2e;
        }

        #cal-logo {
            height: 10vh;
            object-fit: contain;
        }

        #board-title-block {
            display: flex;
            flex-direction: column;
            gap: 3px;
            line-height: 1;
        }

        #board-title-zh {
            color: #ffcc00;
            font-size: 1.8vw;
            font-weight: bold;
            letter-spacing: 0.25em;
        }

        #board-title-en {
            color: #ffffff;
            font-size: 1vw;
            letter-spacing: 0.18em;
        }

        /* Section indicator top-right */
        #section-indicator {
            margin-left: auto;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        #datetime-display {
            color: #ffcc00;
            font-size: 1.05vw;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.08em;
            font-weight: bold;
        }

        #update-label {
            color: #444;
            font-size: 0.6vw;
            letter-spacing: 0.05em;
        }

        /* ── Promo Bar ────────────────────────────── */
        #promo-bar {
            flex: 0 0 auto;
            height: 3.5vh;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #2e2e2e;
            overflow: hidden;
            margin:15px,0,15px,0;
            padding: 16px;
            background: #fff;
        }

        #promo-text {
            color: #ffcc00;
            font-size: 1.4vw;
            font-family: 'NotoSansTC', sans-serif;
            letter-spacing: 0.12em;
            transition: opacity 0.4s ease;
            opacity: 1;
            white-space: nowrap;
            color: #003087;
        }

        /* ── Flight Board ─────────────────────────── */
        #flight-board {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-height: 0;
        }

        .row {
            flex: 1;
            display: flex;
            gap: 0.8vw;
            min-height: 0;
        }

        /* Header row: single solid block per column, no flap cells */
        .header-cell {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffcc00;
            font-size: 1.2vw;
            font-weight: bold;
            background-color: #252525;
            border: 1px solid #333;
            border-radius: 2px;
            letter-spacing: 0.15em;
            white-space: nowrap;
            overflow: hidden;
        }

        .column {
            display: flex;
            gap: 1.5px;
            min-width: 0;
        }

        .flap {
            flex: 1;
            position: relative;
            background-color: #000;
            border-radius: 2px;
            min-width: 0;
        }

        .flap .top,
        .flap .bottom,
        .flap .flipper {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e8e8e8;
            font-size: 1.5vw;
            font-weight: bold;
            background-color: #111;
            border: 1px solid #252525;
            box-sizing: border-box;
            overflow: hidden;
            white-space: nowrap;
            transform: scaleX(0.9);
            transform-origin: center center;
        }

        .flap .top    { clip-path: inset(0 0 50% 0); }
        .flap .bottom { clip-path: inset(50% 0 0 0); }

        .flap .flipper {
            clip-path: inset(0 0 50% 0);
            transform-origin: center bottom;
            z-index: 5;
        }

        /* centre divider line */
        .flap::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background-color: #000;
            z-index: 10;
            pointer-events: none;
        }

        /* Latin flip animation */
        .flap.flipping .flipper {
            animation: flip-down 0.13s cubic-bezier(0.4, 0.0, 1, 1) forwards;
        }

        @keyframes flip-down {
            0%   { transform: perspective(500px) scaleX(0.9) rotateX(0deg); }
            100% { transform: perspective(500px) scaleX(0.9) rotateX(-90deg); }
        }

        /* CJK flip: NotoSansTC, no horizontal compression */
        .flap.cjk .top,
        .flap.cjk .bottom,
        .flap.cjk .flipper {
            font-family: 'NotoSansTC', sans-serif;
            transform: scaleX(1.0);
        }

        .flap.cjk.flipping .flipper {
            animation: flip-down-cjk 0.13s cubic-bezier(0.4, 0.0, 1, 1) forwards;
        }

        @keyframes flip-down-cjk {
            0%   { transform: perspective(500px) scaleX(1.0) rotateX(0deg); }
            100% { transform: perspective(500px) scaleX(1.0) rotateX(-90deg); }
        }

        /* ── Status Bar ───────────────────────────── */
        #status-bar {
            flex: 0 0 auto;
            height: 2.4vh;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 0.4vw;
            gap: 0.8vw;
            border-top: 1px solid #222;
        }

        #no-data-msg {
            margin-right: auto;
            color: #444;
            font-size: 0.65vw;
            letter-spacing: 0.05em;
            display: none;
        }

        #page-indicator {
            color: #555;
            font-size: 0.65vw;
            font-family: 'Courier New', monospace;
            min-width: 4em;
            text-align: right;
        }

        #countdown-bar {
            width: 60px;
            height: 2px;
            background: #222;
            border-radius: 1px;
            overflow: hidden;
        }

        #countdown-fill {
            height: 100%;
            background: #ffcc00;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="board-container">

    <div id="logo-bar">
        <img src="CAL_logo.png" id="cal-logo" alt="China Airlines Logo">
        <div id="board-title-block">
            <div id="board-title-zh">中華航空 全球科技樞紐 航班資訊</div>
            <div id="board-title-en">China Airlines Flight Information for Global Tech Hub Cities</div>
        </div>
        <div id="section-indicator">
            <div id="datetime-display">&#8212;</div>
            <div id="update-label"></div>
        </div>
    </div>

    <div id="promo-bar">
        <div id="promo-text"></div>
    </div>

    <div id="flight-board"></div>

    <div id="status-bar">
        <div id="no-data-msg">&#23608;&#28961;&#36039;&#26009;</div>
        <div id="page-indicator">&#8212; / &#8212;</div>
        <div id="countdown-bar"><div id="countdown-fill"></div></div>
    </div>

</div>

<script>
// ================================================================
// &#35373;&#23450;
// ================================================================
const CONFIG = {
    intervalMs: 10000,  // &#27599;&#39730;&#38996;&#31034;&#31186;&#25976;&#65288;&#27585;&#31186;&#65289;
    pageSize:   10,     // &#27599;&#39730;&#38996;&#31034;&#33322;&#29677;&#25976;
};

// ================================================================
// &#29256;&#38754;&#37197;&#32622;
// COL_LENGTHS: &#27599;&#27284;&#12300;&#23383;&#20lemen;&#25976;&#12301;&#65292;&#21516;&#26178;&#20063;&#26159; flex &#27604;&#20363;
//   &#26178;&#38291;7&#12289;&#30446;&#30340;&#22320;14&#12289;&#33322;&#29677;8&#12289;&#33322;&#24220;4&#12289;&#30767;&#26426;&#38272;4&#12289;&#22577;&#21040;4&#12289;&#29366;&#24907;10
// ================================================================
const COL_LENGTHS = [7, 14, 8, 4, 4, 4, 10];

const PHASES = [
    { lang: 'zh', label: '中文' },
    { lang: 'en', label: 'ENG'  },
];

const HEADERS = {
    zh: ['時間', '目的地', '航班', '航廈', '登機門', '報到', '狀態'],
    en: ['TIME', 'DESTINATION', 'FLIGHT', 'TERM', 'GATE', 'CK', 'STATUS'],
};

const RANDOM_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 ';

// &#21028;&#26377;&#26159;&#21542;&#28858;&#20013;&#25991;&#23383;&#20803;
function isCJK(ch) {
    const c = ch.charCodeAt(0);
    return (c >= 0x4e00 && c <= 0x9fff) || (c >= 0x3000 && c <= 0x30ff) || (c >= 0xff00 && c <= 0xffef);
}

// ================================================================
// &#29366;&#24907;
// ================================================================
let flightData   = { zh: [], en: [] };
let promoMessages = [];
let promoIdx      = 0;
let flapElements = [];  // [rowIdx][colIdx] = [{container, top, bottom, flipper, current}, ...]
let headerCells  = [];  // [colIdx] = header cell DOM element
let phaseIdx     = 0;
let pageIdx      = 0;
let rotationTimer = null;

// ================================================================
// &#36039;&#26009;&#36617;&#20837;&#65288;&#32113;&#38靜;&#24907; JSON&#65292;&#28961;&#22806;&#37096; API&#65289;
// ================================================================
async function loadData() {
    try {
        const [zhRes, enRes] = await Promise.all([
            fetch('data/flights-zh.json'),
            fetch('data/flights-en.json'),
        ]);
        if (zhRes.ok) flightData.zh = await zhRes.json();
        if (enRes.ok) flightData.en = await enRes.json();
    } catch(e) {
        console.warn('Failed to load flight data:', e);
    }
}

async function loadPromo() {
    try {
        const res = await fetch('data/promo.json');
        if (res.ok) promoMessages = await res.json();
    } catch(e) {
        console.warn('Failed to load promo data:', e);
    }
}

function updatePromo() {
    if (promoMessages.length === 0) return;
    const el = document.getElementById('promo-text');
    el.style.opacity = '0';
    setTimeout(() => {
        el.textContent = promoMessages[promoIdx % promoMessages.length];
        el.style.opacity = '1';
        promoIdx = (promoIdx + 1) % promoMessages.length;
    }, 400);
}

// ================================================================
// &#21592;&#26178;&#26178;&#37912;
// ================================================================
function updateClock() {
    const now  = new Date();
    const DAYS = ['日','一','二','三','四','五','六'];
    const pad  = n => String(n).padStart(2, '0');
    const str  = `${now.getFullYear()} · ${pad(now.getMonth()+1)} · ${pad(now.getDate())}  星期${DAYS[now.getDay()]}  ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    document.getElementById('datetime-display').textContent = str;
}

// ================================================================
// &#30475;&#26495;&#21021;&#22987;&#21270;
// ================================================================
function initBoard() {
    const board = document.getElementById('flight-board');
    board.innerHTML = '';
    flapElements = [];

    const totalRows = CONFIG.pageSize + 1; // 1 header + pageSize data rows

    for (let rowIdx = 0; rowIdx < totalRows; rowIdx++) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'row' + (rowIdx === 0 ? ' header-row' : '');

        if (rowIdx === 0) {
            // &#26657;&#39064;&#21015;&#65306;&#27599;&#27284;&#19968;&#20491;&#25972;&#22359; header-cell&#65292;&#19981;&#20351;&#29992;&#32610;&#29262;&#26684;
            headerCells = [];
            COL_LENGTHS.forEach(colLen => {
                const colDiv = document.createElement('div');
                colDiv.className = 'column';
                colDiv.style.flex = colLen;
                const cell = document.createElement('div');
                cell.className = 'header-cell';
                colDiv.appendChild(cell);
                rowDiv.appendChild(colDiv);
                headerCells.push(cell);
            });
            board.appendChild(rowDiv);
            flapElements.push([]); // &#20491;&#20301;&#65292;&#20445;&#25345; rowIdx &#23565;&#40643;
            continue;
        }

        const flapRow = [];

        COL_LENGTHS.forEach(colLen => {
            const colDiv = document.createElement('div');
            colDiv.className = 'column';
            colDiv.style.flex = colLen;

            const flapsInCol = [];
            for (let i = 0; i < colLen; i++) {
                const flap    = document.createElement('div'); flap.className = 'flap';
                const top     = document.createElement('div'); top.className = 'top';     top.textContent = ' ';
                const bottom  = document.createElement('div'); bottom.className = 'bottom'; bottom.textContent = ' ';
                const flipper = document.createElement('div'); flipper.className = 'flipper'; flipper.textContent = ' ';
                flap.append(top, bottom, flipper);
                colDiv.appendChild(flap);
                flapsInCol.push({ container: flap, top, bottom, flipper, current: ' ' });
            }

            rowDiv.appendChild(colDiv);
            flapRow.push(flapsInCol);
        });

        board.appendChild(rowDiv);
        flapElements.push(flapRow);
    }
}

// ================================================================
// &#39611;&#31034;&#36448;&#36755;
// ================================================================
function getRowData(flight) {
    // &#33322;&#29677;&#65306;&#39318;&#23614;&#30041;&#31354; " CI81   "&#65288;8 bits&#65289;
    const fnDisplay = (' ' + flight.flight).padEnd(7, ' ') + ' ';

    // &#33322;&#24220;&#65306;&#39318;&#23614;&#30041;&#31354; " T1 "&#65288;4 bits&#65289;
    const termDisplay = ' ' + String(flight.terminal).slice(0, 2) + ' ';

    // &#30767;&#26426;&#38272;&#65306;&#39318;&#23614;&#30041;&#31354; " A7 "&#65288;4 bits&#65289;
    const gateDisplay = ' ' + String(flight.gate).slice(0, 2) + ' ';

    // &#22577;&#21040;&#31281;&#27171;&#65306;&#39318;&#23614;&#30041;&#31354; " 11 "&#65288;4 bits&#65289;
    const ctr = String(flight.counter);
    const counterDisplay = ' ' + (ctr.length >= 2 ? ctr.slice(0, 2) : ' ' + ctr) + ' ';

    // &#26178;&#38291;&#65306;&#39318;&#23614;&#30041;&#31354; " 08:40 "&#65288;7 bits&#65289;
    const timeDisplay = ' ' + flight.time + ' ';

    return [timeDisplay, flight.destination, fnDisplay, termDisplay, gateDisplay, counterDisplay, flight.status];
}

function updateRow(rowIdx, colData) {
    COL_LENGTHS.forEach((colLen, colIdx) => {
        const str   = String(colData[colIdx] ?? '').padEnd(colLen, ' ').slice(0, colLen);
        const flaps = flapElements[rowIdx][colIdx];

        for (let i = 0; i < flaps.length; i++) {
            const targetChar = str[i] ?? ' ';
            const flapObj    = flaps[i];
            if (flapObj.current === targetChar) continue;

            const delay = Math.random() * 760;
            setTimeout(() => triggerFlip(flapObj, targetChar), delay);
        }
    });
}

function triggerFlip(flapObj, targetChar) {
    let flipCount  = 0;
    const maxFlips = Math.floor(Math.random() * 5) + 3;

    const tick = setInterval(() => {
        flipCount++;
        const nextChar = flipCount >= maxFlips
            ? targetChar
            : RANDOM_CHARS[Math.floor(Math.random() * RANDOM_CHARS.length)];

        if (flipCount >= maxFlips) {
            clearInterval(tick);
            flapObj.current = targetChar;
            flapObj.container.classList.toggle('cjk', isCJK(targetChar));
        }

        flapObj.flipper.textContent = flapObj.top.textContent;
        flapObj.top.textContent     = nextChar;
        flapObj.bottom.textContent  = nextChar;

        flapObj.container.classList.remove('flipping');
        void flapObj.container.offsetWidth; // force reflow
        flapObj.container.classList.add('flipping');
    }, 140);
}

function displayCurrentPage() {
    const phase   = PHASES[phaseIdx];
    const flights = flightData[phase.lang];
    const totalPages = Math.max(1, Math.ceil(flights.length / CONFIG.pageSize));

    // Page indicator
    document.getElementById('page-indicator').textContent = `${pageIdx + 1} / ${totalPages}`;

    // No-data warning
    const noData = flightData.zh.length === 0 && flightData.en.length === 0;
    document.getElementById('no-data-msg').style.display = noData ? 'block' : 'none';

    // Header row
    HEADERS[phase.lang].forEach((text, i) => { headerCells[i].textContent = text; });

    // Data rows
    const pageFlights = flights.slice(pageIdx * CONFIG.pageSize, (pageIdx + 1) * CONFIG.pageSize);
    for (let i = 0; i < CONFIG.pageSize; i++) {
        if (i < pageFlights.length) {
            updateRow(i + 1, getRowData(pageFlights[i]));
        } else {
            updateRow(i + 1, ['', '', '', '', '', '', '']);
        }
    }
}

// ================================================================
// &#36655;&#25773;&#25511;&#21046;
// ================================================================
function advance() {
    const phase = PHASES[phaseIdx];
    const totalPages = Math.max(1, Math.ceil(flightData[phase.lang].length / CONFIG.pageSize));

    pageIdx++;
    if (pageIdx >= totalPages) {
        pageIdx  = 0;
        phaseIdx = (phaseIdx + 1) % PHASES.length;
    }

    displayCurrentPage();
    updatePromo();
    startCountdown();
}

function startCountdown() {
    const fill = document.getElementById('countdown-fill');
    fill.style.transition = 'none';
    fill.style.width      = '100%';
    void fill.offsetWidth;
    fill.style.transition = `width ${CONFIG.intervalMs}ms linear`;
    fill.style.width      = '0%';
}

function startRotation() {
    if (rotationTimer) clearInterval(rotationTimer);
    displayCurrentPage();
    startCountdown();
    rotationTimer = setInterval(advance, CONFIG.intervalMs);
}

// ================================================================
// &#21555;&#21205;
// ================================================================
window.addEventListener('load', async () => {
    initBoard();
    await Promise.all([loadData(), loadPromo()]);
    updateClock();
    setInterval(updateClock, 1000);
    updatePromo();
    startRotation();
});
</script>
</body>
</html>
